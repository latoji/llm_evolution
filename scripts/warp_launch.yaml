# Warp Launch Configuration — LLM Evolution Build
#
# Open 3 panes manually in Warp and run one command per pane (see multi-agent-prompts.md).
# OR copy this file to %APPDATA%\Warp\launch_configurations\llm_build.yaml and use
# Warp icon → Launch Configurations → llm_build.
#
# LAYOUT:
#   ┌──────────────────────────────┬──────────────────────┐
#   │  Sonnet 4.6                  │  Opus 4.7            │
#   │  Tracks 0,A,B1,C,D2,E,Z     │  Tracks B2, D1       │
#   ├──────────────────────────────┴──────────────────────┤
#   │  Build Status (live PLAN.md view)                   │
#   └─────────────────────────────────────────────────────┘

name: llm_build
windows:
  - tabs:
      - title: LLM Evolution Build
        layout:
          rows:
            - panes:
                - title: "Sonnet 4.6 — Tracks 0,A,B1,C,D2,E,Z"
                  commands:
                    - "wsl -e bash -c \"cd /home/latoj/warp_projects/LLM_prototype && source venv/bin/activate && bash scripts/watch_tier.sh claude-sonnet-4-6\""
                - title: "Opus 4.7 — Tracks B2, D1"
                  commands:
                    - "wsl -e bash -c \"cd /home/latoj/warp_projects/LLM_prototype && source venv/bin/activate && bash scripts/watch_tier.sh claude-opus-4-7\""
            - panes:
                - title: "Build Status"
                  commands:
                    - "wsl -e bash -c \"watch -n 15 \\\"grep -E '^#### Track|Status' /home/latoj/warp_projects/LLM_prototype/PLAN.md | paste - -\\\"\""
